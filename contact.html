<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | White Water Rafting</title>
<meta name="description" content="Contact White Water Rafting for general inquiries, reservations, website suggestions, and adventure information.">
<link rel="stylesheet" href="rafting.css">
</head>
<body>

<header>
    <img src="images/logo.png" alt="Rafting Company Logo" class="logo">
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="trips.html">Trips</a>
        <a href="contact.html">Contact Us</a>
    </nav>
</header>

<main>

<section class="contact-info">
    <h1>Contact Us</h1>
    <p><strong>Address:</strong> 123 River Road, Adventure Valley</p>
    <p><strong>Phone:</strong> +1 (555) 123-4567</p>
    <p><strong>Email:</strong> info@whitewaterrafting.com</p>

    <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.019800289207!2d-122.419415!3d37.774929"
    loading="lazy">
    </iframe>
</section>

<section class="employees">
    <h2>Meet Our Team</h2>
    <div class="employee-gallery">
        <figure>
            <img src="images/employee1.jpg" alt="Operations Manager">
            <figcaption>Sarah Johnson - Operations Manager</figcaption>
        </figure>

        <figure>
            <img src="images/employee2.jpg" alt="Lead River Guide">
            <figcaption>Michael Brown - Lead River Guide</figcaption>
        </figure>

        <figure>
            <img src="images/employee3.jpg" alt="Customer Service Manager">
            <figcaption>Emily Davis - Customer Service Manager</figcaption>
        </figure>
    </div>
</section>

<section class="contact-form">
<h2>Send Us a Message</h2>

<form>
<label for="name">Your Name</label>
<input type="text" id="name" name="name" required>

<label for="email">Email Address</label>
<input type="email" id="email" name="email" required>

<p>Purpose of Message:</p>

<label><input type="radio" name="purpose" value="general" required> General Inquiry</label>
<label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
<label><input type="radio" name="purpose" value="website"> Website Suggestion</label>

<label for="message">Message</label>
<textarea id="message" name="message" rows="6"></textarea>

<label class="checkbox">
<input type="checkbox" name="newsletter">
Please subscribe me to the monthly newsletter
</label>

<button type="submit">Send My Message</button>

</form>
</section>

</main>

<footer>
<p>&copy; 2026 White Water Rafting | WDD130 Project</p>
<div class="sociallinks">
<a href="#"><img src="images/facebook.png" alt="Facebook"></a>
<a href="#"><img src="images/instagram.png" alt="Instagram"></a>
<a href="#"><img src="images/twitter.png" alt="Twitter"></a>
</div>
</footer>

</body>
</html>
